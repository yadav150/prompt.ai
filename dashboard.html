<!DOCTYPE html>
<html>
<head>
  <title>Dashboard - Prompt.ai</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="navbar">
  <div><b><a href="index.html" style="text-decoration: none;">Prompt.ai</a></b></div>
</div>

<h2 style="padding:20px;">My Dashboard</h2>

<div id="myPrompts" class="grid"></div>

<script type="module">
import { auth, db } from "./firebase.js";
import { collection, query, where, getDocs } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js";

auth.onAuthStateChanged(async (user) => {
  if (!user) {
    location.href = "login.html";
    return;
  }

  const q = query(collection(db, "prompts"), where("userId", "==", user.uid));
  const snap = await getDocs(q);

  const container = document.getElementById("myPrompts");

  snap.forEach(doc => {
    const p = doc.data();

    container.innerHTML += `
      <div class="card">
        <h3>${p.title}</h3>
        <p>${p.category}</p>
        <small>👁 ${p.views} views</small>
      </div>
    `;
  });
});
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Prompt Hub</title>

<style>
body {
  font-family: Arial;
  margin: 0;
  background: #f9fafb;
}

header {
  background: #111827;
  color: white;
  padding: 20px;
  text-align: center;
}

.container {
  padding: 20px;
}

input, textarea, select, button {
  width: 100%;
  margin-top: 10px;
  padding: 10px;
  border-radius: 6px;
  border: 1px solid #ddd;
}

button {
  background: #111827;
  color: white;
  cursor: pointer;
}

.grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
  gap: 15px;
  margin-top: 20px;
}

.card {
  background: white;
  padding: 15px;
  border-radius: 10px;
  cursor: pointer;
  box-shadow: 0 2px 8px rgba(0,0,0,0.05);
}

.tag {
  display: inline-block;
  padding: 3px 8px;
  background: #e5e7eb;
  font-size: 12px;
  border-radius: 5px;
  margin-top: 5px;
}
</style>

</head>
<body>

<header>
  <h1>Prompt Hub</h1>
</header>

<div class="container">

<!-- SEARCH -->
<input id="searchInput" placeholder="Search prompts...">

<!-- SUBMIT FORM -->
<h2>Submit Prompt</h2>

<form id="submitForm">
  <input id="title" placeholder="Title" required>
  <textarea id="prompt" placeholder="Write prompt..." required></textarea>

  <select id="category">
    <option>AI</option>
    <option>Art</option>
    <option>Writing</option>
    <option>Coding</option>
  </select>

  <input id="image" placeholder="Image URL (optional)">

  <button type="submit">Submit</button>
</form>

<!-- FEATURED -->
<h2>Featured</h2>
<div class="grid" id="featured"></div>

<!-- ALL PROMPTS -->
<h2>Latest Prompts</h2>
<div class="grid" id="list"></div>

</div>

<!-- FIREBASE -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import {
  getFirestore,
  collection,
  addDoc,
  getDocs,
  orderBy,
  query
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

// 🔥 YOUR FIREBASE CONFIG (PASTE YOURS HERE)
const firebaseConfig = {
  apiKey: "YOUR_API_KEY",
  authDomain: "YOUR_AUTH_DOMAIN",
  projectId: "YOUR_PROJECT_ID",
  storageBucket: "YOUR_STORAGE_BUCKET",
  messagingSenderId: "YOUR_SENDER_ID",
  appId: "YOUR_APP_ID"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// ELEMENTS
const form = document.getElementById("submitForm");
const list = document.getElementById("list");
const featured = document.getElementById("featured");
const searchInput = document.getElementById("searchInput");

// DATA STORE
let allData = [];

// SUBMIT PROMPT
form.addEventListener("submit", async (e) => {
  e.preventDefault();

  await addDoc(collection(db, "prompts"), {
    title: title.value,
    prompt: prompt.value,
    category: category.value,
    image: image.value || "",
    created: Date.now()
  });

  alert("Prompt Submitted!");
  form.reset();
  loadData();
});

// LOAD DATA
async function loadData() {
  const q = query(collection(db, "prompts"), orderBy("created", "desc"));
  const snap = await getDocs(q);

  allData = [];

  snap.forEach(doc => {
    allData.push({ id: doc.id, ...doc.data() });
  });

  render(allData);
}

// RENDER
function render(data) {
  list.innerHTML = "";
  featured.innerHTML = "";

  data.forEach((p, i) => {

    const card = document.createElement("div");
    card.className = "card";

    card.innerHTML = `
      <h3>${p.title}</h3>
      <p>${p.prompt.substring(0, 80)}...</p>
      <span class="tag">${p.category}</span>
    `;

    card.onclick = () => {
      alert(p.prompt);
    };

    list.appendChild(card);

    // Featured (first 3)
    if (i < 3) {
      const f = card.cloneNode(true);
      featured.appendChild(f);
    }
  });
}

// SEARCH
searchInput.addEventListener("input", (e) => {
  const val = e.target.value.toLowerCase();

  const filtered = allData.filter(p =>
    p.title.toLowerCase().includes(val) ||
    p.prompt.toLowerCase().includes(val)
  );

  render(filtered);
});

loadData();

</script>

</body>
</html>

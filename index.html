<!DOCTYPE html>
<html>
<head>
<title>Prompt.ai</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="navbar">
  <div><b>Prompt.ai</b></div>
  <div class="nav-links">
    <a href="index.html">Home</a>
    <a href="categories.html">Categories</a>
    <a href="submit.html">Submit</a>
    <a href="dashboard.html">Dashboard</a>
    <a href="login.html" id="loginBtn">Login</a>
    <a href="#" id="logoutBtn" onclick="logout()">Logout</a>
  </div>
</div>

<div class="hero">
  <h1>Discover & Share AI Prompts</h1>
  <div class="search-box">
    <input placeholder="Search prompts...">
  </div>
</div>

<h2 style="padding-left:20px;">Recent Contributions</h2>
<div class="grid" id="recent"></div>

<script type="module">
import { getRecent } from "./app.js";

const recent = document.getElementById("recent");

const data = await getRecent();

data.forEach(doc=>{
  const p = doc.data();

  recent.innerHTML += `
    <div class="card" onclick="openPrompt('${doc.id}')">
      <h3>${p.title}</h3>
      <p>${p.prompt.slice(0,120)}...</p>
      <small>${p.category}</small>
    </div>
  `;
});

window.openPrompt = (id)=>{
  location.href = "prompt.html?id="+id;
};
</script>

<script type="module" src="app.js"></script>
</body>
</html>

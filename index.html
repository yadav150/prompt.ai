<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Prompt.ai</title>

  <!-- CSS -->
  <link rel="stylesheet" href="css/style.css" />

  <!-- Google Font -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
</head>
<body>

  <!-- NAVBAR -->
  <header class="navbar">
    <div class="container nav-container">
      <div class="logo">Prompt.ai</div>

      <nav class="nav-links" id="navLinks">
  <a href="index.html">Home</a>
  <a href="category.html">Categories</a>
  <a href="publish.html">Publish</a>
</nav>

      <div class="menu-toggle" id="menuToggle">☰</div>
    </div>
  </header>

  <!-- HERO -->
  <section class="hero">
    <div class="container hero-content">
      <h1>Discover & Share Powerful AI Prompts</h1>
      <p>Explore high-quality prompts or publish your own to reach thousands.</p>
      <a href="category.html" class="btn-primary">Explore Prompts</a>
    </div>
  </section>

  <!-- FEATURED PROMPTS -->
  <section class="section">
    <div class="container">
      <h2 class="section-title">Featured Prompts</h2>

      <div class="grid" id="featuredPrompts">
    <!-- JS will load prompts here -->
</div>
  </section>

  <!-- CATEGORIES -->
  <section class="section light-bg">
    <div class="container">
      <h2 class="section-title">Categories</h2>

      <div class="grid">
        <div class="card small" onclick="goCategory('Image Generation')">Image Generation</div>
<div class="card small" onclick="goCategory('Writing')">Writing</div>
<div class="card small" onclick="goCategory('Coding')">Coding</div>
<div class="card small" onclick="goCategory('Marketing')">Marketing</div>
      </div>
    </div>
  </section>

  <!-- FOOTER -->
  <footer class="footer">
    <div class="container">
      <p>© 2026 Prompt.ai — Built for creators</p>
    </div>
  </footer>

  <!-- JS -->
  <script src="js/main.js"></script>
<script type="module">
import { db } from "./js/firebase.js";
import { collection, getDocs } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const container = document.getElementById("featuredPrompts");

async function loadPrompts() {
  try {
    const querySnapshot = await getDocs(collection(db, "prompts"));

    let prompts = [];

    querySnapshot.forEach(doc => {
      prompts.push({
        id: doc.id,
        ...doc.data()
      });
    });

    if (prompts.length === 0) {
      container.innerHTML = "<p>No prompts yet.</p>";
      return;
    }

    // Latest first
    prompts.reverse().slice(0, 6).forEach(p => {
      const div = document.createElement("div");
      div.className = "card";

      div.innerHTML = `
        ${p.image ? `<img src="${p.image}" style="width:100%; border-radius:3px; margin-bottom:8px;">` : ""}
        <h3>${p.title}</h3>
        <p>${p.prompt.substring(0, 80)}...</p>
      `;

      div.addEventListener("click", () => {
        window.location.href = `prompt.html?id=${p.id}`;
      });

      container.appendChild(div);
    });

  } catch (err) {
    console.error(err);
    container.innerHTML = "<p>Error loading prompts</p>";
  }
}

loadPrompts();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Publish Prompt - Prompt.ai</title>

  <link rel="stylesheet" href="css/style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
</head>
<body>

  <!-- NAVBAR -->
  <header class="navbar">
    <div class="container nav-container">
      <div class="logo">Prompt.ai</div>

      <nav class="nav-links" id="navLinks">
        <a href="index.html">Home</a>
        <a href="#">Categories</a>
        <a href="#">Publish</a>
      </nav>

      <div class="menu-toggle" id="menuToggle">☰</div>
    </div>
  </header>

  <!-- FORM SECTION -->
  <section class="section">
    <div class="container" style="max-width:600px;">

      <h1 style="margin-bottom:20px;">Publish Your Prompt</h1>

      <form id="publishForm" class="card">

  <!-- NAME -->
  <div class="form-group">
    <label>Your Name *</label>
    <input type="text" id="name" required placeholder="Enter your name" />
  </div>

  <!-- EMAIL -->
  <div class="form-group">
    <label>Email (optional)</label>
    <input type="email" id="email" placeholder="Enter your email" />
  </div>

  <!-- TITLE -->
  <div class="form-group">
    <label>Title *</label>
    <input type="text" id="title" required placeholder="Enter prompt title" />
  </div>

  <!-- CATEGORY -->
  <div class="form-group">
    <label>Category *</label>
    <select id="category" required>
      <option value="">Select Category</option>
      <option>Image Generation</option>
      <option>Writing</option>
      <option>Coding</option>
      <option>Marketing</option>
    </select>
  </div>

  <!-- PROMPT -->
  <div class="form-group">
    <label>Prompt *</label>
    <textarea id="prompt" rows="5" required placeholder="Write your prompt here..."></textarea>
  </div>

  <!-- DESCRIPTION -->
  <div class="form-group">
    <label>Description</label>
    <textarea id="description" rows="4" placeholder="Optional description..."></textarea>
  </div>

  <!-- IMAGE UPLOAD -->
<div class="form-group">
  <label>Upload Image (optional)</label>
  <input type="file" id="image" accept="image/*" />

  <!-- PREVIEW -->
  <img id="previewImage"
       style="width:100%; margin-top:10px; border-radius:3px; display:none;" />
  <!-- ❌ REMOVE BUTTON -->
  <span id="removeImage"
        style="position:absolute; top:35px; right:10px; cursor:pointer; display:none;">
    ❌
  </span>
</div>
  <!-- TERMS -->
  <div class="form-group checkbox">
    <input type="checkbox" id="terms" required />
    <label for="terms">
      I confirm this prompt is created by me, not copyrighted,
      and I agree to the terms & privacy. If found copied,
      Prompt.ai can remove it.
    </label>
  </div>

  <!-- SUBMIT -->
  <button type="submit" class="btn-primary" style="width:100%;">
    Publish Prompt
  </button>

</form>

    </div>
  </section>

  <!-- FOOTER -->
  <footer class="footer">
    <div class="container">
      <p>© 2026 Prompt.ai — Built for creators</p>
    </div>
  </footer>

  <script src="js/main.js"></script>
  <script type="module">
import { db } from "./js/firebase.js";
import { collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const form = document.getElementById("publishForm");

// IMAGE ELEMENTS
const imageInput = document.getElementById("image");
const preview = document.getElementById("previewImage");

// ❌ REMOVE BUTTON (agar add kiya hai HTML me)
let removeBtn = document.getElementById("removeImage");

// =======================
// 🔥 FORM SUBMIT
// =======================
form.addEventListener("submit", async (e) => {
  e.preventDefault();

  try {
    // TERMS CHECK
    if (!document.getElementById("terms").checked) {
      alert("Please accept terms");
      return;
    }

    // IMAGE → BASE64
    let imageBase64 = "";
    const file = imageInput.files[0];

    if (file) {
      imageBase64 = await convertToBase64(file);
    }

    // DATA
    const data = {
      name: document.getElementById("name").value,
      email: document.getElementById("email").value,
      title: document.getElementById("title").value,
      category: document.getElementById("category").value,
      prompt: document.getElementById("prompt").value,
      description: document.getElementById("description").value,
      image: imageBase64,
      createdAt: serverTimestamp(),
      likes: 0,
      views: 0
    };

    // SAVE TO FIREBASE
    await addDoc(collection(db, "prompts"), data);

    alert("🔥 Prompt Published Successfully");

    form.reset();

    // RESET IMAGE UI
    preview.style.display = "none";
    if (removeBtn) removeBtn.style.display = "none";

  } catch (err) {
    console.error(err);
    alert("Error: " + err.message);
  }
});

// =======================
// 🔥 IMAGE PREVIEW
// =======================
imageInput.addEventListener("change", () => {
  const file = imageInput.files[0];

  if (file) {
    const reader = new FileReader();

    reader.onload = function(e) {
      preview.src = e.target.result;
      preview.style.display = "block";

      if (removeBtn) removeBtn.style.display = "block";
    };

    reader.readAsDataURL(file);
  }
});

// =======================
// 🔥 REMOVE IMAGE
// =======================
if (removeBtn) {
  removeBtn.addEventListener("click", () => {
    imageInput.value = "";
    preview.style.display = "none";
    removeBtn.style.display = "none";
  });
}

// =======================
// 🔥 BASE64 FUNCTION
// =======================
function convertToBase64(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = () => resolve(reader.result);
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}
</script>

</body>
</html>

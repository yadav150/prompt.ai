<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Publish Prompt - Prompt.ai</title>

  <link rel="stylesheet" href="css/style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
</head>
<body>

  <!-- NAVBAR -->
  <header class="navbar">
    <div class="container nav-container">
      <div class="logo">Prompt.ai</div>

      <nav class="nav-links" id="navLinks">
        <a href="index.html">Home</a>
        <a href="#">Categories</a>
        <a href="#">Publish</a>
      </nav>

      <div class="menu-toggle" id="menuToggle">☰</div>
    </div>
  </header>

  <!-- FORM SECTION -->
  <section class="section">
    <div class="container" style="max-width:600px;">

      <h1 style="margin-bottom:20px;">Publish Your Prompt</h1>

      <form id="publishForm" class="card">

  <!-- NAME -->
  <div class="form-group">
    <label>Your Name *</label>
    <input type="text" id="name" required placeholder="Enter your name" />
  </div>

  <!-- EMAIL -->
  <div class="form-group">
    <label>Email (optional)</label>
    <input type="email" id="email" placeholder="Enter your email" />
  </div>

  <!-- TITLE -->
  <div class="form-group">
    <label>Title *</label>
    <input type="text" id="title" required placeholder="Enter prompt title" />
  </div>

  <!-- CATEGORY -->
  <div class="form-group">
    <label>Category *</label>
    <select id="category" required>
      <option value="">Select Category</option>
      <option>Image Generation</option>
      <option>Writing</option>
      <option>Coding</option>
      <option>Marketing</option>
    </select>
  </div>

  <!-- PROMPT -->
  <div class="form-group">
    <label>Prompt *</label>
    <textarea id="prompt" rows="5" required placeholder="Write your prompt here..."></textarea>
  </div>

  <!-- DESCRIPTION -->
  <div class="form-group">
    <label>Description</label>
    <textarea id="description" rows="4" placeholder="Optional description..."></textarea>
  </div>

  <!-- IMAGE UPLOAD -->
  <div class="form-group">
    <label>Upload Image (optional)</label>
    <input type="file" id="image" accept="image/*" />
  </div>

  <!-- TERMS -->
  <div class="form-group checkbox">
    <input type="checkbox" id="terms" required />
    <label for="terms">
      I confirm this prompt is created by me, not copyrighted,
      and I agree to the terms & privacy. If found copied,
      Prompt.ai can remove it.
    </label>
  </div>

  <!-- SUBMIT -->
  <button type="submit" class="btn-primary" style="width:100%;">
    Publish Prompt
  </button>

</form>

    </div>
  </section>

  <!-- FOOTER -->
  <footer class="footer">
    <div class="container">
      <p>© 2026 Prompt.ai — Built for creators</p>
    </div>
  </footer>

  <script src="js/main.js"></script>

  <script type="module">
import { db } from "./js/firebase.js";
import { collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const form = document.getElementById("publishForm");

form.addEventListener("submit", async (e) => {
  e.preventDefault();

  // TERMS CHECK
  if (!document.getElementById("terms").checked) {
    alert("Please accept terms");
    return;
  }

  const data = {
    name: document.getElementById("name").value,
    email: document.getElementById("email").value,
    title: document.getElementById("title").value,
    category: document.getElementById("category").value,
    prompt: document.getElementById("prompt").value,
    description: document.getElementById("description").value,
    createdAt: serverTimestamp(),
    likes: 0,
    views: 0
  };

  try {
    await addDoc(collection(db, "prompts"), data);

    alert(" Prompt Published Successfully");

    form.reset();
  } catch (err) {
    alert("Error: " + err.message);
  }
});
</script>

</body>
</html>

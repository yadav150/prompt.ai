<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Category</title>

<style>
body {
  font-family: Arial;
  margin: 0;
  background: #f9fafb;
}

header {
  background: #111827;
  color: white;
  padding: 15px;
  text-align: center;
}

.container {
  padding: 20px;
}

.grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
  gap: 15px;
}

.card {
  background: white;
  padding: 15px;
  border-radius: 10px;
  cursor: pointer;
  box-shadow: 0 2px 8px rgba(0,0,0,0.05);
}

.tag {
  display: inline-block;
  padding: 3px 8px;
  background: #e5e7eb;
  font-size: 12px;
  border-radius: 5px;
  margin-top: 5px;
}
</style>

</head>
<body>

<header>
  <h2 id="catTitle">Category</h2>
</header>

<div class="container">
  <div class="grid" id="list"></div>
</div>

<!-- FIREBASE -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import {
  getFirestore,
  collection,
  getDocs
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

// 🔥 YOUR FIREBASE CONFIG
const firebaseConfig = {
  apiKey: "AIzaSyCDdHDWhC-JkJqBSNxKAd7dWwX8agBYuuc",
  authDomain: "prompt-ai-a0c21.firebaseapp.com",
  projectId: "prompt-ai-a0c21",
  storageBucket: "prompt-ai-a0c21.firebasestorage.app",
  messagingSenderId: "322416217341",
  appId: "1:322416217341:web:c43dcc16ac86bbba24c294",
  measurementId: "G-B98ZKD5KP9"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const list = document.getElementById("list");
const catTitle = document.getElementById("catTitle");

// GET CATEGORY FROM URL
const params = new URLSearchParams(window.location.search);
const category = params.get("name");

catTitle.innerText = category ? category.toUpperCase() : "ALL";

let allData = [];

async function loadCategory() {
  const snap = await getDocs(collection(db, "prompts"));

  allData = [];

  snap.forEach(doc => {
    allData.push({ id: doc.id, ...doc.data() });
  });

  render();
}

function render() {
  list.innerHTML = "";

  let filtered = allData;

  if (category) {
    filtered = allData.filter(p =>
      (p.category || "").toLowerCase() === category.toLowerCase()
    );
  }

  filtered.reverse().forEach(p => {
    const div = document.createElement("div");
    div.className = "card";

    div.innerHTML = `
      <h3>${p.title}</h3>
      <p>${p.prompt.substring(0, 80)}...</p>
      <span class="tag">${p.category}</span>
    `;

    div.onclick = () => {
      window.location.href = `prompt.html?id=${p.id}`;
    };

    list.appendChild(div);
  });
}

loadCategory();
</script>

</body>
</html>

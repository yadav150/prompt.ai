<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Category - Prompt.ai</title>

  <link rel="stylesheet" href="css/style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
</head>
<body>

  <!-- NAVBAR -->
  <header class="navbar">
    <div class="container nav-container">
      <div class="logo">Prompt.ai</div>

      <nav class="nav-links" id="navLinks">
        <a href="index.html">Home</a>
        <a href="#">Categories</a>
        <a href="publish.html">Publish</a>
      </nav>

      <div class="menu-toggle" id="menuToggle">☰</div>
    </div>
  </header>

  <!-- CATEGORY CONTENT -->
  <section class="section">
    <div class="container">

      <h1 id="categoryTitle" style="margin-bottom:20px;">Category</h1>

      <div id="promptList" class="grid"></div>

    </div>
  </section>

  <!-- FOOTER -->
  <footer class="footer">
    <div class="container">
      <p>© 2026 Prompt.ai — Built for creators</p>
    </div>
  </footer>

  <script src="js/main.js"></script>

  <script type="module">
import { db } from "./js/firebase.js";
import { collection, getDocs } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const params = new URLSearchParams(window.location.search);
const category = params.get("name");

document.getElementById("categoryTitle").innerText = category || "All Prompts";

const promptList = document.getElementById("promptList");

async function loadPrompts() {
  const querySnapshot = await getDocs(collection(db, "prompts"));

  let prompts = [];

  querySnapshot.forEach(doc => {
  prompts.push({
    id: doc.id,
    ...doc.data()
  });
});

  let filtered = category
    ? prompts.filter(p => p.category === category)
    : prompts;

  if (filtered.length === 0) {
    promptList.innerHTML = "<p>No prompts found.</p>";
    return;
  }

  filtered.forEach(p => {
    const div = document.createElement("div");
    div.className = "card";

    div.innerHTML = `
  <h3>${p.title}</h3>
  <p>${p.prompt.substring(0, 80)}...</p>
`;

div.addEventListener("click", () => {
  window.location.href = `prompt.html?id=${p.id}`;
});

    promptList.appendChild(div);
  });
}

loadPrompts();
</script>

</body>
</html>
